title: "DKPS run-level prediction: 2x query efficiency (MAE in expectation)"

description: |
  CLAIM: On a majority of HELM datasets, DKPS at a query budget of `n_eval_small`
  achieves MAE no worse than the naive sample-mean estimator evaluated at
  `n_eval_large` (= 2 * n_eval_small) queries. That is: DKPS predicts target-model
  scores as accurately using half as many benchmark queries.

  This is an "in expectation" claim: each sweep point runs `num_replicates`
  independent Monte-Carlo replicates INSIDE the symbol resolution and emits a
  single scalar MAE per estimator for that dataset. This contrasts with the
  companion card (jhu_run_predict_query_efficiency.yaml), which externalizes
  replicates as sweep points and parallelizes them via the MAGNET scheduler.

  Design note for Kitware: There's no native way today to express more complex
  reducers - I opened a commit for a simple fraction reducer, but if we wanted
  to leave the parallelism in a place where it is managed by the runtime
  (instead of maybe abusing the library like I'm doing here...) we could write
  a more expressive reducer — I don't think it'd be that complicated.

claim:
  python: |
    assert _results['avg_dkps_mae'] <= _results['avg_sample_mae'], (
      f"[{dataset_cfg['dataset']}] "
      f"DKPS@{n_eval_small}={_results['avg_dkps_mae']:.4f} > "
      f"Sample@{n_eval_large}={_results['avg_sample_mae']:.4f} "
      f"(n_replicates={_results['num_replicates']})"
    )
  reduce:
    type: fraction
    threshold: 0.80

symbols:
  helm_suite_path:
    type: str
    value: '/Users/bjohnson/data/crfm-helm-public/lite/benchmark_output/runs/_all'

  n_eval_small:
    type: int
    value: 4

  n_eval_large:
    type: int
    value: 8

  num_replicates:
    type: int
    value: 32

  num_example_runs:
    type: int
    value: 64

  n_components_cmds:
    type: int
    value: 8

  base_seed:
    type: int
    value: 1

  dataset_cfg:
    type: Any
    sweep:
      - {dataset: "med_qa",                                                metric: "exact_match", split: "valid"}
      - {dataset: "legalbench:subset=abercrombie",                         metric: "exact_match", split: "test"}
      - {dataset: "legalbench:subset=corporate_lobbying",                  metric: "exact_match", split: "test"}
      - {dataset: "legalbench:subset=function_of_decision_section",        metric: "exact_match", split: "test"}
      - {dataset: "legalbench:subset=international_citizenship_questions", metric: "exact_match", split: "test"}
      - {dataset: "legalbench:subset=proa",                                metric: "exact_match", split: "test"}

  # Monte-Carlo over num_replicates seeds. Per seed: two predictor calls
  # (one at each query budget) so we can compare DKPS@n_eval_small vs
  # sample-mean@n_eval_large on the same randomly-chosen target model.
  _results:
    type: Any
    depends_on:
      - helm_suite_path
      - dataset_cfg
      - n_eval_small
      - n_eval_large
      - num_replicates
      - base_seed
      - num_example_runs
      - n_components_cmds
    python: |
      from contextlib import redirect_stdout
      from io import StringIO
      from magnet.backends.helm.helm_outputs import HelmSuite
      from jhu_ta1.algorithms.dkps_run_predictor import DKPSRunPredictor

      suite   = HelmSuite(helm_suite_path)
      dataset = dataset_cfg['dataset']
      metric  = dataset_cfg['metric']
      split   = dataset_cfg['split']

      def pull_actual(test_split):
          row = test_split.stats
          row = row[
              (row['stats.name.name'] == metric)
              & (row['stats.name.split'] == split)
              & (row['stats.name.perturbation.name'].isna())
          ]
          return float(row['stats.mean'].iloc[0])

      def pull_sample_mean(test_split):
          rows = test_split.per_instance_stats
          rows = rows[rows['per_instance_stats.stats.name.name'] == metric]
          return float(rows['per_instance_stats.stats.mean'].mean())

      errors_dkps_small   = []
      errors_sample_large = []
      for i in range(num_replicates):
          seed = base_seed + i
          buf = StringIO()
          with redirect_stdout(buf):
              dkps_predictor = DKPSRunPredictor(
                  num_example_runs  = num_example_runs,
                  num_eval_samples  = n_eval_small,
                  random_seed       = seed,
                  n_components_cmds = n_components_cmds,
                  dataset           = dataset,
                  metric            = metric,
                  split             = split,
              )
              train_split_dkps, test_split_dkps = dkps_predictor.prepare_all_dataframes(suite)
              p_dkps       = float(dkps_predictor.predict(train_split_dkps, test_split_dkps.sequester())[0].mean)
              actual_dkps  = pull_actual(test_split_dkps)

              # Same seed -> same target model, but harness subsamples n_eval_large instances
              # (vs. n_eval_small in the dkps call) so the sample-mean is over a larger query set.
              sample_predictor = DKPSRunPredictor(
                  num_example_runs  = num_example_runs,
                  num_eval_samples  = n_eval_large,
                  random_seed       = seed,
                  n_components_cmds = n_components_cmds,
                  dataset           = dataset,
                  metric            = metric,
                  split             = split,
              )
              _, test_split_sample = sample_predictor.prepare_all_dataframes(suite)
              actual_sample = pull_actual(test_split_sample)
              p_sample      = pull_sample_mean(test_split_sample)

          errors_dkps_small.append(abs(p_dkps - actual_dkps))
          errors_sample_large.append(abs(p_sample - actual_sample))

      _results = {
          'avg_dkps_mae':   float(sum(errors_dkps_small)   / len(errors_dkps_small)),
          'avg_sample_mae': float(sum(errors_sample_large) / len(errors_sample_large)),
          'num_replicates': num_replicates,
      }
      print(f"[{dataset}] MAE(dkps @ n={n_eval_small})  = {_results['avg_dkps_mae']:.4f}")
      print(f"[{dataset}] MAE(sample @ n={n_eval_large}) = {_results['avg_sample_mae']:.4f}")
